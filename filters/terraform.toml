schema_version = 1

[filters.terraform]
match_command = "terraform plan"
strip_ansi = true

[[filters.terraform.match_output]]
pattern = "Plan: (\\d+) to add, (\\d+) to change, (\\d+) to destroy"
message = "terraform: $1 add, $2 change, $3 destroy"

[[filters.terraform.match_output]]
pattern = "No changes. Your infrastructure matches the configuration."
message = "terraform: no changes"

strip_lines_matching = ["^Refreshing state...", "^Reading..."]
max_lines = 50

[[tests.terraform]]
name = "no changes"
input = """
Refreshing state...
No changes. Your infrastructure matches the configuration.
"""
expected = "terraform: no changes"

[[tests.terraform]]
name = "plan success"
input = """
Refreshing state...
Plan: 2 to add, 0 to change, 1 to destroy.
"""
expected = "terraform: 2 add, 0 change, 1 destroy"
