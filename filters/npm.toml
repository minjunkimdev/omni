schema_version = 1

[filters.npm]
description = "Filter noise from npm/yarn/pnpm/bun install"
match_command = "^(npm|yarn|pnpm|bun) (install|ci|add|remove)"
strip_ansi = true
strip_lines_matching = [
    "^npm warn",
    "^npm WARN",
    "^WARN deprecated",
    "^\\s*$",
    "^npm notice",
    "^\\s*added \\d+ packages, and audited",
    "^\\s*\\d+ packages are looking for funding",
    "^\\s*run `npm fund`",
]
on_empty = "npm: install ok"

[[filters.npm.match_output]]
pattern = "found (\\d+) vulnerabilities"
message = "npm: $1 vulnerabilities found!"
unless = "found 0 vulnerabilities"

[[filters.npm.match_output]]
pattern = "added (\\d+) packages"
message = "npm: added $1 packages"

[[tests.npm]]
name = "clean install"
input = """
npm warn deprecated inflight@1.0.6: This module is not supported
npm warn deprecated glob@7.2.3: Glob versions prior to v9 are no longer supported

added 245 packages, and audited 246 packages in 12s

38 packages are looking for funding
  run `npm fund` for details

found 0 vulnerabilities
"""
expected = "npm: added 245 packages"

[[tests.npm]]
name = "install with vulnerabilities"
input = """
npm warn deprecated request@2.88.2

added 120 packages in 8s

found 3 vulnerabilities (1 low, 2 moderate)
"""
expected = "npm: 3 vulnerabilities found!"
