name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build Release Binaries
    runs-on: ubuntu-latest

    permissions:
      contents: write

    strategy:
      matrix:
        target:
          - x86_64-linux
          - aarch64-linux
          - x86_64-macos
          - aarch64-macos

    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Build Native Binary
        run: |
          cd core
          zig build \
            -Dtarget=${{ matrix.target }} \
            -Doptimize=ReleaseFast \
            -Dversion=${{ github.ref_name }} \
            -p ../

      - name: Build WASM
        run: |
          cd core
          zig build wasm \
            -Doptimize=ReleaseSmall \
            -Dversion=${{ github.ref_name }} \
            -p ../

      - name: Package Release
        run: |
          mkdir -p release
          cp bin/omni release/omni-${{ matrix.target }}
          cp bin/omni-wasm.wasm release/

          tar -czf omni-${{ matrix.target }}.tar.gz -C release .

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            omni-${{ matrix.target }}.tar.gz
            core/omni-wasm.wasm
          generate_release_notes: true
