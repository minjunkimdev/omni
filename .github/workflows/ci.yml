name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Zig
      uses: mlugg/setup-zig@v1
      with:
        version: master

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: CI - Zig Native Core
      run: |
        cd core
        zig build -Doptimize=ReleaseFast -Dversion=CI-BUILD -p ../
        ../bin/omni --version

    - name: CI - Zig Wasm Core
      run: |
        cd core
        zig build wasm -Doptimize=ReleaseSmall -Dversion=CI-BUILD -p ../

    - name: CI - Zig Tests
      run: |
        cd core
        zig build test

    - name: CI - TypeScript MCP Gateway
      run: |
        npm install
        npm run build
        
    - name: Artifact - Upload Wasm
      uses: actions/upload-artifact@v4
      with:
        name: omni-wasm
        path: core/omni-wasm.wasm
